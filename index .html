<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>API Testing Interview Prep</title>
<link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@400;500;600;700&family=Cabinet+Grotesk:wght@300;400;500;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f0e8;
  --surface:#fffdf7;
  --surface2:#f0ebe0;
  --ink:#1a1410;
  --ink2:#4a3f30;
  --muted:#9a8f7a;
  --border:#e0d8c8;
  --accent:#e8531a;
  --accent2:#1a6fe8;
  --accent3:#16a34a;
  --accent4:#9333ea;
  --yellow:#f5c518;
  --tag-bg:#1a1410;
  --tag-text:#f5f0e8;
  --easy:#dcfce7;--easy-t:#15803d;
  --med:#fef9c3;--med-t:#a16207;
  --hard:#fee2e2;--hard-t:#dc2626;
  --expert:#f3e8ff;--expert-t:#7c3aed;
}
html{scroll-behavior:smooth}
body{
  background:var(--bg);
  font-family:'Cabinet Grotesk',sans-serif;
  color:var(--ink);
  min-height:100vh;
}

/* ── NOISE TEXTURE ── */
body::before{
  content:'';position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events:none;z-index:0;opacity:.4;
}

/* ── HERO ── */
.hero{
  padding:60px 40px 40px;
  max-width:1100px;margin:0 auto;
  position:relative;
}
.hero-label{
  display:inline-flex;align-items:center;gap:8px;
  background:var(--tag-bg);color:var(--tag-text);
  font-family:'Fira Code',monospace;font-size:.72rem;
  padding:6px 14px;border-radius:2px;
  letter-spacing:2px;margin-bottom:24px;
}
.hero-label span{color:var(--accent);animation:blink 1s step-end infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.hero h1{
  font-family:'Clash Display',sans-serif;
  font-size:clamp(2.4rem,6vw,4.5rem);
  font-weight:700;line-height:1.05;
  letter-spacing:-2px;
  margin-bottom:16px;
}
.hero h1 em{
  font-style:normal;
  -webkit-text-stroke:2px var(--ink);
  color:transparent;
}
.hero-sub{
  font-size:1.05rem;color:var(--ink2);
  max-width:560px;line-height:1.7;margin-bottom:32px;
  font-weight:400;
}
.stats-row{
  display:flex;flex-wrap:wrap;gap:16px;margin-bottom:40px;
}
.stat-pill{
  display:flex;align-items:center;gap:8px;
  background:var(--surface);border:1.5px solid var(--border);
  padding:10px 18px;border-radius:50px;
  font-size:.85rem;font-weight:500;
}
.stat-pill strong{color:var(--accent);font-family:'Clash Display',sans-serif;font-size:1.1rem}

/* ── SEARCH & FILTER BAR ── */
.controls{
  background:var(--surface);border:1.5px solid var(--border);
  border-radius:12px;padding:16px 20px;
  display:flex;flex-wrap:wrap;gap:12px;align-items:center;
  margin-bottom:32px;
  box-shadow:0 2px 16px #1a141008;
}
.search-wrap{
  flex:1;min-width:200px;position:relative;
}
.search-wrap input{
  width:100%;padding:10px 16px 10px 40px;
  border:1.5px solid var(--border);border-radius:8px;
  background:var(--bg);font-family:'Cabinet Grotesk',sans-serif;
  font-size:.92rem;color:var(--ink);outline:none;
  transition:border-color .2s;
}
.search-wrap input:focus{border-color:var(--accent)}
.search-wrap::before{
  content:'⌕';position:absolute;left:12px;top:50%;transform:translateY(-50%);
  color:var(--muted);font-size:1.1rem;
}
.filter-chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{
  padding:7px 14px;border-radius:50px;
  border:1.5px solid var(--border);background:transparent;
  font-family:'Cabinet Grotesk',sans-serif;font-size:.8rem;font-weight:500;
  cursor:pointer;transition:all .2s;color:var(--ink2);
}
.chip:hover{border-color:var(--ink);color:var(--ink)}
.chip.active{background:var(--tag-bg);color:var(--tag-text);border-color:var(--tag-bg)}
.chip.easy.active{background:var(--easy-t);border-color:var(--easy-t);color:#fff}
.chip.medium.active{background:var(--med-t);border-color:var(--med-t);color:#fff}
.chip.hard.active{background:var(--hard-t);border-color:var(--hard-t);color:#fff}
.chip.expert.active{background:var(--expert-t);border-color:var(--expert-t);color:#fff}

/* ── MAIN LAYOUT ── */
.main{max-width:1100px;margin:0 auto;padding:0 40px 80px;position:relative;z-index:1}

/* ── SECTION HEADERS ── */
.section-header{
  display:flex;align-items:center;gap:12px;
  margin:40px 0 20px;
}
.section-num{
  width:36px;height:36px;border-radius:6px;
  background:var(--tag-bg);color:var(--tag-text);
  display:flex;align-items:center;justify-content:center;
  font-family:'Fira Code',monospace;font-size:.8rem;font-weight:500;
  flex-shrink:0;
}
.section-header h2{
  font-family:'Clash Display',sans-serif;
  font-size:1.5rem;font-weight:600;letter-spacing:-0.5px;
}
.section-line{flex:1;height:1.5px;background:var(--border);margin-left:8px}

/* ── QUESTION CARDS ── */
.questions-grid{display:flex;flex-direction:column;gap:12px}

.q-card{
  background:var(--surface);
  border:1.5px solid var(--border);
  border-radius:12px;overflow:hidden;
  transition:all .25s;
  position:relative;
}
.q-card:hover{
  border-color:#c0b8a8;
  box-shadow:0 8px 32px #1a141010;
  transform:translateY(-1px);
}
.q-card.open{border-color:var(--accent);box-shadow:0 4px 24px #e8531a15}

.q-header{
  display:flex;align-items:flex-start;gap:14px;
  padding:18px 20px;cursor:pointer;user-select:none;
}
.q-num{
  font-family:'Fira Code',monospace;font-size:.72rem;
  color:var(--muted);font-weight:500;flex-shrink:0;
  margin-top:3px;min-width:28px;
}
.q-title{
  flex:1;font-size:.97rem;font-weight:500;line-height:1.5;
  color:var(--ink);
}
.q-meta{display:flex;align-items:center;gap:8px;flex-shrink:0;margin-top:2px}
.badge{
  font-size:.65rem;font-weight:600;letter-spacing:.5px;
  padding:3px 9px;border-radius:4px;text-transform:uppercase;
}
.badge.easy{background:var(--easy);color:var(--easy-t)}
.badge.medium{background:var(--med);color:var(--med-t)}
.badge.hard{background:var(--hard);color:var(--hard-t)}
.badge.expert{background:var(--expert);color:var(--expert-t)}

.chevron{
  color:var(--muted);font-size:1rem;
  transition:transform .3s;flex-shrink:0;
  margin-top:2px;
}
.q-card.open .chevron{transform:rotate(180deg);color:var(--accent)}

/* ── ANSWER ── */
.q-answer{
  max-height:0;overflow:hidden;
  transition:max-height .4s cubic-bezier(.4,0,.2,1);
}
.q-card.open .q-answer{max-height:2000px}
.answer-inner{
  padding:0 20px 22px 62px;
  border-top:1.5px solid var(--border);
  padding-top:18px;
}
.answer-inner p{
  font-size:.92rem;line-height:1.8;color:var(--ink2);
  margin-bottom:12px;
}
.answer-inner p:last-child{margin-bottom:0}
.answer-inner strong{color:var(--ink);font-weight:600}
.answer-inner ul,.answer-inner ol{
  padding-left:20px;margin-bottom:12px;
}
.answer-inner li{
  font-size:.92rem;line-height:1.8;color:var(--ink2);
  margin-bottom:4px;
}
.answer-inner li strong{color:var(--ink)}

/* ── CODE ── */
.code-snippet{
  background:#1a1410;color:#f5f0e8;
  border-radius:8px;padding:16px 18px;
  font-family:'Fira Code',monospace;font-size:.8rem;
  line-height:1.8;margin:12px 0;overflow-x:auto;
  position:relative;
}
.code-snippet .c-green{color:#4ade80}
.code-snippet .c-yellow{color:#fde047}
.code-snippet .c-blue{color:#60a5fa}
.code-snippet .c-red{color:#f87171}
.code-snippet .c-orange{color:#fb923c}
.code-snippet .c-purple{color:#c084fc}
.code-snippet .c-gray{color:#9ca3af}

/* ── TIP BOX ── */
.tip-box{
  background:linear-gradient(135deg,#fff9e6,#fff3cd);
  border:1.5px solid #f5c518;border-left:4px solid #f5c518;
  border-radius:8px;padding:12px 16px;margin:12px 0;
  font-size:.88rem;color:#78580a;line-height:1.7;
}
.tip-box::before{content:'💡 ';font-size:.9rem}

.note-box{
  background:#eff6ff;border:1.5px solid #bfdbfe;border-left:4px solid var(--accent2);
  border-radius:8px;padding:12px 16px;margin:12px 0;
  font-size:.88rem;color:#1e40af;line-height:1.7;
}
.note-box::before{content:'📌 ';font-size:.9rem}

/* ── TABLE ── */
.q-table{width:100%;border-collapse:collapse;margin:12px 0;font-size:.85rem}
.q-table th{background:var(--tag-bg);color:var(--tag-text);padding:9px 14px;text-align:left;font-weight:500}
.q-table td{padding:8px 14px;border-bottom:1px solid var(--border);color:var(--ink2)}
.q-table tr:last-child td{border-bottom:none}
.q-table tr:hover td{background:var(--bg)}

/* ── PROGRESS ── */
.progress-bar-wrap{
  background:var(--surface);border:1.5px solid var(--border);
  border-radius:8px;padding:16px 20px;margin-bottom:24px;
  display:flex;align-items:center;gap:16px;
}
.prog-track{flex:1;height:8px;background:var(--border);border-radius:4px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),#f5a623);border-radius:4px;transition:width .5s ease;width:0%}
.prog-label{font-size:.8rem;color:var(--muted);font-family:'Fira Code',monospace;white-space:nowrap}

/* ── EMPTY STATE ── */
.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.empty p{font-size:1rem}

/* ── BACK TO TOP ── */
.back-top{
  position:fixed;bottom:32px;right:32px;
  width:44px;height:44px;border-radius:50%;
  background:var(--tag-bg);color:var(--tag-text);
  border:none;cursor:pointer;font-size:1.1rem;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 16px #1a141030;
  opacity:0;transform:translateY(10px);
  transition:all .3s;z-index:999;
}
.back-top.show{opacity:1;transform:translateY(0)}

@media(max-width:640px){
  .hero{padding:40px 20px 24px}
  .main{padding:0 20px 60px}
  .answer-inner{padding:16px}
  .q-meta{display:none}
}
</style>
</head>
<body>

<!-- HERO -->
<div class="hero" style="z-index:1;position:relative">
  <div class="hero-label"><span>▶</span> INTERVIEW PREP KIT</div>
  <h1>API Testing<br/><em>Interview Q&A</em></h1>
  <p class="hero-sub">From absolute basics to senior-level concepts. Every question you need to crack your next API testing interview — with detailed answers.</p>
  <div class="stats-row">
    <div class="stat-pill"><strong id="totalCount">80</strong> Questions</div>
    <div class="stat-pill"><strong>5</strong> Levels</div>
    <div class="stat-pill"><strong id="openedCount">0</strong> Explored</div>
    <div class="stat-pill">🕐 <strong>~4hrs</strong> Study Time</div>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- CONTROLS -->
  <div class="controls">
    <div class="search-wrap">
      <input type="text" id="searchInput" placeholder="Search questions..." oninput="filterAll()"/>
    </div>
    <div class="filter-chips">
      <button class="chip active" data-level="all" onclick="setLevel(this,'all')">All</button>
      <button class="chip easy" data-level="easy" onclick="setLevel(this,'easy')">🟢 Beginner</button>
      <button class="chip medium" data-level="medium" onclick="setLevel(this,'medium')">🟡 Intermediate</button>
      <button class="chip hard" data-level="hard" onclick="setLevel(this,'hard')">🔴 Advanced</button>
      <button class="chip expert" data-level="expert" onclick="setLevel(this,'expert')">🟣 Expert</button>
    </div>
  </div>

  <!-- PROGRESS -->
  <div class="progress-bar-wrap">
    <div class="prog-track"><div class="prog-fill" id="progFill"></div></div>
    <div class="prog-label" id="progLabel">0% explored</div>
  </div>

  <!-- QUESTIONS RENDERED HERE -->
  <div id="questionsRoot"></div>

</div>

<button class="back-top" id="backTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

<script>
// ══════════════════════════════════════════
//  ALL QUESTIONS DATA
// ══════════════════════════════════════════
const sections = [
  {
    title:"API Fundamentals",
    icon:"01",
    questions:[
      {
        q:"What is an API? Explain with a real-world example.",
        level:"easy",
        a:`<p>An <strong>API (Application Programming Interface)</strong> is a set of rules and protocols that allows different software applications to communicate with each other. It defines how requests should be made and what responses to expect.</p>
        <p><strong>Real-world example:</strong> Think of a restaurant. You (the client) look at the menu (API documentation), tell the waiter (API) your order, and the kitchen (server) prepares it. You don't need to know how the kitchen works — just how to communicate with the waiter.</p>
        <div class="note-box">In software: When you use a weather app, it calls a weather API to get temperature data from a remote server. The app doesn't know how the server stores data — it just uses the API.</div>
        <p><strong>Key components of an API:</strong></p>
        <ul>
          <li><strong>Endpoint</strong> — The URL where the API can be accessed</li>
          <li><strong>Request</strong> — What you ask the API for</li>
          <li><strong>Response</strong> — What the API sends back</li>
          <li><strong>Authentication</strong> — Proof that you're allowed to use it</li>
        </ul>`
      },
      {
        q:"What are the different types of APIs?",
        level:"easy",
        a:`<p>APIs are categorized by their access level and architecture:</p>
        <p><strong>By Access Level:</strong></p>
        <ul>
          <li><strong>Public APIs</strong> — Open to everyone (e.g., OpenWeatherMap, Twitter API)</li>
          <li><strong>Private APIs</strong> — Internal use only within an organization</li>
          <li><strong>Partner APIs</strong> — Shared with specific business partners</li>
          <li><strong>Composite APIs</strong> — Combine multiple APIs in one call</li>
        </ul>
        <p><strong>By Architecture Style:</strong></p>
        <ul>
          <li><strong>REST</strong> — Most popular, uses HTTP methods</li>
          <li><strong>SOAP</strong> — Older, uses XML, very strict</li>
          <li><strong>GraphQL</strong> — Query exactly what you need</li>
          <li><strong>gRPC</strong> — Fast, uses Protocol Buffers, great for microservices</li>
          <li><strong>WebSocket</strong> — Real-time, two-way communication</li>
        </ul>`
      },
      {
        q:"What is REST? What are its 6 constraints?",
        level:"easy",
        a:`<p><strong>REST (Representational State Transfer)</strong> is an architectural style for designing networked applications. APIs following REST principles are called RESTful APIs.</p>
        <p><strong>6 REST Constraints:</strong></p>
        <ul>
          <li><strong>1. Client-Server</strong> — Client and server are separate; client handles UI, server handles data</li>
          <li><strong>2. Stateless</strong> — Each request must contain all info needed; server stores no client state between requests</li>
          <li><strong>3. Cacheable</strong> — Responses should indicate if they can be cached to improve performance</li>
          <li><strong>4. Uniform Interface</strong> — Consistent way to interact (standard HTTP methods, URIs, status codes)</li>
          <li><strong>5. Layered System</strong> — Client doesn't know if it's talking directly to server or a middleman (proxy, load balancer)</li>
          <li><strong>6. Code on Demand (optional)</strong> — Server can send executable code to the client (e.g., JavaScript)</li>
        </ul>
        <div class="tip-box">REST APIs use standard HTTP methods: GET, POST, PUT, PATCH, DELETE. This makes them easy to understand and use.</div>`
      },
      {
        q:"Explain HTTP methods: GET, POST, PUT, PATCH, DELETE",
        level:"easy",
        a:`<p>HTTP methods define what action to perform on a resource:</p>
        <div class="code-snippet"><span class="c-green">GET</span>    /users/1      → Retrieve user with ID 1 (Read)
<span class="c-yellow">POST</span>   /users         → Create a new user
<span class="c-blue">PUT</span>    /users/1      → Replace entire user record (Full update)
<span class="c-orange">PATCH</span>  /users/1      → Update only specific fields (Partial update)
<span class="c-red">DELETE</span> /users/1      → Delete user with ID 1</div>
        <table class="q-table"><thead><tr><th>Method</th><th>Idempotent?</th><th>Safe?</th><th>Has Body?</th></tr></thead><tbody>
        <tr><td>GET</td><td>✅ Yes</td><td>✅ Yes</td><td>❌ No</td></tr>
        <tr><td>POST</td><td>❌ No</td><td>❌ No</td><td>✅ Yes</td></tr>
        <tr><td>PUT</td><td>✅ Yes</td><td>❌ No</td><td>✅ Yes</td></tr>
        <tr><td>PATCH</td><td>❌ No</td><td>❌ No</td><td>✅ Yes</td></tr>
        <tr><td>DELETE</td><td>✅ Yes</td><td>❌ No</td><td>Optional</td></tr>
        </tbody></table>
        <div class="note-box"><strong>Idempotent</strong> means calling it multiple times gives the same result. <strong>Safe</strong> means it doesn't modify data.</div>`
      },
      {
        q:"What are HTTP Status Codes? List the important ones.",
        level:"easy",
        a:`<p>HTTP status codes tell you the result of your API request. They're grouped by first digit:</p>
        <table class="q-table"><thead><tr><th>Code</th><th>Meaning</th><th>When</th></tr></thead><tbody>
        <tr><td><strong>200</strong></td><td>OK</td><td>Successful GET/PUT/PATCH</td></tr>
        <tr><td><strong>201</strong></td><td>Created</td><td>Successful POST (resource created)</td></tr>
        <tr><td><strong>204</strong></td><td>No Content</td><td>Successful DELETE (nothing to return)</td></tr>
        <tr><td><strong>400</strong></td><td>Bad Request</td><td>Invalid input / malformed request</td></tr>
        <tr><td><strong>401</strong></td><td>Unauthorized</td><td>Not authenticated (no/bad token)</td></tr>
        <tr><td><strong>403</strong></td><td>Forbidden</td><td>Authenticated but no permission</td></tr>
        <tr><td><strong>404</strong></td><td>Not Found</td><td>Resource doesn't exist</td></tr>
        <tr><td><strong>405</strong></td><td>Method Not Allowed</td><td>Wrong HTTP method used</td></tr>
        <tr><td><strong>409</strong></td><td>Conflict</td><td>Duplicate resource / version conflict</td></tr>
        <tr><td><strong>422</strong></td><td>Unprocessable Entity</td><td>Validation failed</td></tr>
        <tr><td><strong>429</strong></td><td>Too Many Requests</td><td>Rate limit exceeded</td></tr>
        <tr><td><strong>500</strong></td><td>Internal Server Error</td><td>Server-side bug</td></tr>
        <tr><td><strong>502</strong></td><td>Bad Gateway</td><td>Upstream server problem</td></tr>
        <tr><td><strong>503</strong></td><td>Service Unavailable</td><td>Server down/overloaded</td></tr>
        </tbody></table>
        <div class="tip-box">Quick memory trick: 2xx = Success, 3xx = Redirect, 4xx = Client error (your fault), 5xx = Server error (their fault)</div>`
      },
      {
        q:"What is the difference between SOAP and REST?",
        level:"easy",
        a:`<table class="q-table"><thead><tr><th>Feature</th><th>REST</th><th>SOAP</th></tr></thead><tbody>
        <tr><td>Format</td><td>JSON, XML, HTML</td><td>XML only</td></tr>
        <tr><td>Protocol</td><td>HTTP</td><td>HTTP, SMTP, TCP</td></tr>
        <tr><td>Speed</td><td>Faster, lightweight</td><td>Slower, heavy</td></tr>
        <tr><td>Standards</td><td>Flexible</td><td>Strict (WSDL)</td></tr>
        <tr><td>Security</td><td>HTTPS, OAuth</td><td>WS-Security (built-in)</td></tr>
        <tr><td>Caching</td><td>Supported</td><td>Not supported</td></tr>
        <tr><td>Use Case</td><td>Web/Mobile APIs</td><td>Banking, Enterprise</td></tr>
        </tbody></table>
        <div class="note-box">SOAP is like sending a formal letter in an envelope. REST is like sending a text message. Both work, but REST is much faster and simpler for most use cases.</div>`
      },
      {
        q:"What is an API Endpoint? Give examples.",
        level:"easy",
        a:`<p>An <strong>endpoint</strong> is a specific URL where an API resource can be accessed. It's the address you send your request to.</p>
        <div class="code-snippet"><span class="c-gray"># Base URL</span>
https://api.example.com

<span class="c-gray"># Endpoints</span>
<span class="c-green">GET</span>    https://api.example.com/<span class="c-yellow">users</span>           → All users
<span class="c-green">GET</span>    https://api.example.com/<span class="c-yellow">users/42</span>       → User with ID 42
<span class="c-yellow">POST</span>   https://api.example.com/<span class="c-yellow">users</span>           → Create user
<span class="c-blue">PUT</span>    https://api.example.com/<span class="c-yellow">users/42</span>       → Update user 42
<span class="c-red">DELETE</span> https://api.example.com/<span class="c-yellow">users/42</span>       → Delete user 42
<span class="c-green">GET</span>    https://api.example.com/<span class="c-yellow">users/42/orders</span> → Orders of user 42</div>
        <p><strong>Good endpoint naming rules:</strong></p>
        <ul>
          <li>Use nouns, not verbs: <code>/users</code> not <code>/getUsers</code></li>
          <li>Use plural nouns: <code>/products</code> not <code>/product</code></li>
          <li>Use lowercase and hyphens: <code>/order-items</code></li>
          <li>Use hierarchy for relationships: <code>/users/{id}/posts</code></li>
        </ul>`
      },
      {
        q:"What is JSON? Why is it used in APIs?",
        level:"easy",

        q:"What is JWT? How does it work?",

        <p><strong>JWT has 3 parts separated by dots:</strong></p>
        <div class="code-snippet"><span class="c-green">eyJhbGciOiJIUzI1NiJ9</span>.<span class="c-yellow">eyJ1c2VySWQiOjQyfQ</span>.<span class="c-red">SflKxwRJSMeKKF2QT4</span>

<span class="c-green">HEADER</span>          <span class="c-yellow">PAYLOAD</span>          <span class="c-red">SIGNATURE</span></div>
        <ul>
          <li><strong>Header</strong> — Algorithm type: <code>{"alg": "HS256", "typ": "JWT"}</code></li>
          <li><strong>Payload</strong> — Claims (user data): <code>{"userId": 42, "role": "admin", "exp": 1700000000}</code></li>
          <li><strong>Signature</strong> — Hash of header + payload with a secret key (verifies authenticity)</li>
        </ul>
        <p><strong>JWT Flow:</strong></p>
        <ol>
          <li>User logs in with credentials</li>
          <li>Server validates, creates JWT, sends back</li>
          <li>Client stores JWT (localStorage or cookie)</li>
          <li>Client sends JWT in every subsequent request</li>
          <li>Server validates signature on each request</li>
        </ol>
        <div class="tip-box">JWT is stateless — the server doesn't store sessions. The token itself contains all needed info. Always check expiry (exp claim)!</div>`

<span class="c-gray">3.</span> User logs in & grants permission on Google
<span class="c-gray">4.</span> Google redirects back with <span class="c-green">Authorization Code</span>
<span class="c-gray">5.</span> App sends code + client_secret → Google
<span class="c-gray">6.</span> Google returns <span class="c-yellow">Access Token</span> + <span class="c-blue">Refresh Token</span>
<span class="c-gray">7.</span> App uses Access Token to call Google APIs</div>
        <p><strong>OAuth 2.0 Grant Types:</strong></p>

        q:"What is GraphQL? How is it different from REST?",
        level:"hard",
        a:`<p><strong>GraphQL</strong> is a query language for APIs that lets clients request exactly the data they need — no more, no less.</p>
        <div class="code-snippet"><span class="c-gray"># REST - Multiple requests needed</span>
GET /users/1          → gets full user object
GET /users/1/posts    → gets all posts (even if you only want titles)
GET /users/1/friends  → separate call for friends

<span class="c-gray"># GraphQL - ONE request, exact data</span>
query {
  user(id: 1) {
    name
    posts { title }
    friends { name }
  }
}</div>
        <table class="q-table"><thead><tr><th>Feature</th><th>REST</th><th>GraphQL</th></tr></thead><tbody>
        <tr><td>Endpoints</td><td>Many (one per resource)</td><td>Single endpoint (/graphql)</td></tr>
        <tr><td>Over-fetching</td><td>Common problem</td><td>Never — get what you ask</td></tr>
        <tr><td>Under-fetching</td><td>Common (multiple calls)</td><td>Never — one query</td></tr>
        <tr><td>Versioning</td><td>v1, v2, v3 URLs</td><td>No versioning needed</td></tr>
        <tr><td>Learning curve</td><td>Low</td><td>Higher</td></tr>
        <tr><td>Caching</td><td>Easy (HTTP caching)</td><td>Complex</td></tr>

        <tr><td>GET</td><td>✅</td><td>✅</td><td>Just reads data, no side effects</td></tr>
        <tr><td>HEAD</td><td>✅</td><td>✅</td><td>Same as GET but no body</td></tr>
        <tr><td>OPTIONS</td><td>✅</td><td>✅</td><td>Just describes options</td></tr>
        <tr><td>POST</td><td>❌</td><td>❌</td><td>Creates new resource each time</td></tr>
        <tr><td>PUT</td><td>❌</td><td>✅</td><td>Replace always gives same result</td></tr>
        <tr><td>PATCH</td><td>❌</td><td>❌</td><td>Relative changes can accumulate</td></tr>
        <tr><td>DELETE</td><td>❌</td><td>✅</td><td>Deleting twice = same end state</td></tr>
        </tbody></table>
        <div class="note-box">DELETE is idempotent: first call deletes the resource (204), second call returns 404. The end state (resource gone) is the same.</div>`

//  STATE

let currentLevel = 'all';
let openedSet = new Set();
let totalQ = 0;

// ══════════════════════════════════════════
//  RENDER
// ══════════════════════════════════════════
function render() {
  const root = document.getElementById('questionsRoot');
  const search = document.getElementById('searchInput').value.toLowerCase();
  root.innerHTML = '';
  totalQ = 0;
  let visibleCount = 0;

  sections.forEach(sec => {
    const filtered = sec.questions.filter(q => {
      const matchLevel = currentLevel === 'all' || q.level === currentLevel;
      const matchSearch = !search || q.q.toLowerCase().includes(search);
      return matchLevel && matchSearch;
    });

    if (filtered.length === 0) return;
    visibleCount += filtered.length;

    const secDiv = document.createElement('div');
    secDiv.innerHTML = `
      <div class="section-header">
        <div class="section-num">${sec.icon}</div>
        <h2>${sec.title}</h2>
        <div class="section-line"></div>
      </div>
      <div class="questions-grid" id="grid-${sec.icon}"></div>
    `;
    root.appendChild(secDiv);

    const grid = secDiv.querySelector(`#grid-${sec.icon}`);
    filtered.forEach((q, i) => {
      totalQ++;
      const globalIdx = `${sec.icon}-${i}`;
      const isOpen = openedSet.has(globalIdx);
      const card = document.createElement('div');
      card.className = `q-card${isOpen ? ' open' : ''}`;
      card.innerHTML = `
        <div class="q-header" onclick="toggleCard('${globalIdx}', this)">
          <span class="q-num">Q${totalQ.toString().padStart(2,'0')}</span>
          <span class="q-title">${q.q}</span>
          <div class="q-meta">
            <span class="badge ${q.level}">${q.level}</span>
          </div>
          <span class="chevron">▾</span>
        </div>
        <div class="q-answer">
          <div class="answer-inner">${q.a}</div>
        </div>
      `;
      grid.appendChild(card);
    });
  });

  if (visibleCount === 0) {
    root.innerHTML = `<div class="empty"><p>No questions found. Try a different search!</p></div>`;
  }

  document.getElementById('totalCount').textContent = totalQ;
  updateProgress();
}

function toggleCard(id, header) {
  const card = header.closest('.q-card');
  const wasOpen = card.classList.contains('open');
  card.classList.toggle('open');
  if (!wasOpen) {
    openedSet.add(id);
  }
  updateProgress();
}

function setLevel(btn, level) {
  currentLevel = level;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function filterAll() { render(); }

function updateProgress() {
  const pct = totalQ > 0 ? Math.round(openedSet.size / totalQ * 100) : 0;
  document.getElementById('progFill').style.width = pct + '%';
  document.getElementById('progLabel').textContent = `${pct}% explored`;
  document.getElementById('openedCount').textContent = openedSet.size;
}

// Back to top
window.addEventListener('scroll', () => {
  const btn = document.getElementById('backTop');
  btn.classList.toggle('show', window.scrollY > 400);
});

// Init
render();
</script>
</body>
</html>
